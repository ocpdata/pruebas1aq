name: Destroy Arcadia

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect_aws_context:
    name: Collect AWS context
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
    outputs:
      has_aws_state: ${{ steps.state.outputs.has_aws_state }}
      public_ip: ${{ steps.state.outputs.public_ip }}
      public_dns: ${{ steps.state.outputs.public_dns }}
      vpc_id: ${{ steps.network.outputs.vpc_id }}
      public_subnet_id: ${{ steps.network.outputs.public_subnet_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Discover default AWS network
        id: network
        run: |
          vpc_id="$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)"

          if [[ -z "$vpc_id" || "$vpc_id" == "None" ]]; then
            echo "No default VPC was found in region ${AWS_DEFAULT_REGION}." >&2
            exit 1
          fi

          subnet_id="$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values="$vpc_id" \
            --query 'Subnets[?MapPublicIpOnLaunch==`true`].SubnetId | [0]' \
            --output text)"

          if [[ -z "$subnet_id" || "$subnet_id" == "None" ]]; then
            echo "No public subnet with MapPublicIpOnLaunch=true was found in VPC ${vpc_id}." >&2
            exit 1
          fi

          echo "vpc_id=$vpc_id" >> "$GITHUB_OUTPUT"
          echo "public_subnet_id=$subnet_id" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform/aws
        run: |
          cat > backend.hcl <<EOF
          organization = "${{ secrets.TFC_ORG }}"
          workspaces {
            name = "arcadia-aws"
          }
          EOF

          terraform init \
            -input=false \
            -backend-config=backend.hcl

      - name: Read AWS Terraform state
        id: state
        working-directory: terraform/aws
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_vpc_id: ${{ steps.network.outputs.vpc_id }}
          TF_VAR_public_subnet_id: ${{ steps.network.outputs.public_subnet_id }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_arcadia_repo_ref: master
        run: |
          state_entries="$(terraform state list 2>/dev/null || true)"

          if [[ -z "$state_entries" ]]; then
            echo "has_aws_state=false" >> "$GITHUB_OUTPUT"
            echo "public_ip=" >> "$GITHUB_OUTPUT"
            echo "public_dns=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_aws_state=true" >> "$GITHUB_OUTPUT"
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          echo "public_dns=$(terraform output -raw public_dns)" >> "$GITHUB_OUTPUT"

  f5_dcs_destroy:
    name: F5 DCS destroy
    runs-on: ubuntu-latest
    needs: collect_aws_context
    if: needs.collect_aws_context.outputs.has_aws_state == 'true'
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Materialize XC API credentials
        run: |
          mkdir -p .tmp
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > .tmp/xc-api-creds.p12

      - name: Terraform init
        working-directory: terraform/f5xc
        run: |
          cat > backend.hcl <<EOF
          organization = "${{ secrets.TFC_ORG }}"
          workspaces {
            name = "arcadia-f5xc"
          }
          EOF

          terraform init \
            -input=false \
            -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform/f5xc
        run: terraform validate

      - name: Terraform destroy
        working-directory: terraform/f5xc
        env:
          TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
          TF_VAR_xc_api_p12_file: ${{ github.workspace }}/.tmp/xc-api-creds.p12
          TF_VAR_xc_namespace: nathan
          TF_VAR_arcadia_domain: arcadia.digitalvs.com
          TF_VAR_origin_public_ip: ${{ needs.collect_aws_context.outputs.public_ip }}
          TF_VAR_origin_public_dns: ${{ needs.collect_aws_context.outputs.public_dns }}
          TF_VAR_origin_public_port: "80"
          VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
        run: terraform destroy -input=false -auto-approve

  aws_destroy:
    name: AWS destroy
    runs-on: ubuntu-latest
    needs:
      - collect_aws_context
      - f5_dcs_destroy
    if: |
      always() &&
      needs.collect_aws_context.outputs.has_aws_state == 'true' &&
      (needs.f5_dcs_destroy.result == 'success' || needs.f5_dcs_destroy.result == 'skipped')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/aws
        run: |
          cat > backend.hcl <<EOF
          organization = "${{ secrets.TFC_ORG }}"
          workspaces {
            name = "arcadia-aws"
          }
          EOF

          terraform init \
            -input=false \
            -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform/aws
        run: terraform validate

      - name: Terraform destroy
        working-directory: terraform/aws
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_vpc_id: ${{ needs.collect_aws_context.outputs.vpc_id }}
          TF_VAR_public_subnet_id: ${{ needs.collect_aws_context.outputs.public_subnet_id }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_arcadia_repo_ref: master
        run: terraform destroy -input=false -auto-approve