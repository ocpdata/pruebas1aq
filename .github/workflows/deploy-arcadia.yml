name: Deploy Arcadia

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aws_infra:
    name: AWS infrastructure
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
    outputs:
      instance_id: ${{ steps.outputs.outputs.instance_id }}
      public_ip: ${{ steps.outputs.outputs.public_ip }}
      public_dns: ${{ steps.outputs.outputs.public_dns }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Discover default AWS network
        id: network
        run: |
          vpc_id="$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)"

          if [[ -z "$vpc_id" || "$vpc_id" == "None" ]]; then
            echo "No default VPC was found in region ${AWS_DEFAULT_REGION}." >&2
            exit 1
          fi

          subnet_id="$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values="$vpc_id" \
            --query 'Subnets[?MapPublicIpOnLaunch==`true`].SubnetId | [0]' \
            --output text)"

          if [[ -z "$subnet_id" || "$subnet_id" == "None" ]]; then
            echo "No public subnet with MapPublicIpOnLaunch=true was found in VPC ${vpc_id}." >&2
            exit 1
          fi

          echo "vpc_id=$vpc_id" >> "$GITHUB_OUTPUT"
          echo "public_subnet_id=$subnet_id" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform/aws
        run: |
          cat > backend.hcl <<EOF
          organization = "${{ secrets.TFC_ORG }}"
          workspaces {
            name = "arcadia-aws"
          }
          EOF

          terraform init \
            -input=false \
            -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform/aws
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform/aws
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_vpc_id: ${{ steps.network.outputs.vpc_id }}
          TF_VAR_public_subnet_id: ${{ steps.network.outputs.public_subnet_id }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_arcadia_repo_ref: main
        run: terraform apply -input=false -auto-approve

      - name: Capture Terraform outputs
        id: outputs
        working-directory: terraform/aws
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          echo "public_dns=$(terraform output -raw public_dns)" >> "$GITHUB_OUTPUT"

  arcadia_app:
    name: Arcadia application
    runs-on: ubuntu-latest
    needs: aws_infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arcadia through SSM
        run: |
          chmod +x scripts/install_arcadia_via_ssm.sh
          scripts/install_arcadia_via_ssm.sh \
            --instance-id "${{ needs.aws_infra.outputs.instance_id }}" \
            --region "${{ vars.AWS_REGION }}" \
            --repo-ref "main"

  f5_dcs_config:
    name: F5 DCS configuration
    runs-on: ubuntu-latest
    needs:
      - aws_infra
      - arcadia_app
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Materialize XC API credentials
        run: |
          mkdir -p .tmp
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > .tmp/xc-api-creds.p12

      - name: Terraform init
        working-directory: terraform/f5xc
        run: |
          cat > backend.hcl <<EOF
          organization = "${{ secrets.TFC_ORG }}"
          workspaces {
            name = "arcadia-f5xc"
          }
          EOF

          terraform init \
            -input=false \
            -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform/f5xc
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform/f5xc
        env:
          TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
          TF_VAR_xc_api_p12_file: ${{ github.workspace }}/.tmp/xc-api-creds.p12
          TF_VAR_xc_namespace: nathan
          TF_VAR_arcadia_domain: arcadia.digitalvs.com
          TF_VAR_origin_public_ip: ${{ needs.aws_infra.outputs.public_ip }}
          TF_VAR_origin_public_dns: ${{ needs.aws_infra.outputs.public_dns }}
          TF_VAR_origin_public_port: "80"
          VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
        run: terraform apply -input=false -auto-approve
